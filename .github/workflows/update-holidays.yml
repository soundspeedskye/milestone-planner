name: Update holidays

on:
  schedule:
    - cron: '0 0 1 * *' # 매월 1일 09:00 KST
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      AZURE_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Fetch holidays from data.go.kr
        run: npm run fetch:holidays
        env:
          DATA_GO_KR_SERVICE_KEY: ${{ secrets.DATA_GO_KR_SERVICE_KEY }}
      - run: npm test
      - name: Commit if changed
        id: commit
        run: |
          if git diff --quiet src/constants/holidays.generated.ts; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "공휴일 변경 없음"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/constants/holidays.generated.ts
            git commit -m "chore: 공휴일 데이터 자동 갱신 (data.go.kr)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      # GITHUB_TOKEN으로 push하면 deploy 워크플로가 자동 실행되지 않으므로 여기서 직접 배포한다
      - name: Build
        if: steps.commit.outputs.changed == 'true'
        run: npm run build
      # Azure 토큰이 등록되기 전에는 갱신·커밋까지만 하고 배포는 건너뛴다
      - name: Deploy
        if: steps.commit.outputs.changed == 'true' && env.AZURE_TOKEN != ''
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.AZURE_TOKEN }}
          action: upload
          # skip_app_build일 때는 app_location이 그대로 업로드된다 (output_location 무시)
          app_location: 'dist'
          output_location: ''
          skip_app_build: true
