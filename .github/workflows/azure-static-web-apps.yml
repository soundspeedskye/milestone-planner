name: Deploy to Azure Static Web Apps

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    env:
      AZURE_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      # Azure 토큰이 등록되기 전에는 빌드·테스트까지만 하고 배포는 건너뛴다
      - name: Deploy
        if: env.AZURE_TOKEN != ''
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.AZURE_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          # skip_app_build일 때는 output_location이 무시되고 app_location이 그대로 업로드된다.
          # '/'로 두면 소스 전체가 배포되므로 반드시 빌드 결과물 폴더를 가리켜야 한다.
          app_location: 'dist'
          output_location: ''
          skip_app_build: true
      - name: Azure 미설정 안내
        if: env.AZURE_TOKEN == ''
        run: echo "::notice::AZURE_STATIC_WEB_APPS_API_TOKEN 시크릿이 없어 배포를 건너뛰었습니다. 빌드와 테스트는 통과했습니다."

  close_pr:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    env:
      AZURE_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
    steps:
      - name: Close preview
        if: env.AZURE_TOKEN != ''
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.AZURE_TOKEN }}
          action: close
